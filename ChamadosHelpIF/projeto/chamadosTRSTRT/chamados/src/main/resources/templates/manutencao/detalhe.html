<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do Chamado — HelpIF</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628; --navy-mid: #112240; --navy-light: #1d3461;
            --accent: #00d68f; --accent-dim: #00a36c; --accent-glow: rgba(0,214,143,0.18);
            --warn: #f59e0b; --success: #10b981; --danger: #ef4444;
            --surface: #f4f7fb; --card: #ffffff; --border: #e2e8f0;
            --text: #0f1923; --muted: #6b7a99;
            --font: 'Outfit', sans-serif; --mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--surface); color: var(--text); min-height: 100vh; }
        .app-shell { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar {
            width: 72px; background: var(--navy);
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5rem 0; gap: 0.4rem;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }
        .sidebar-logo {
            width: 42px; height: 42px; background: var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem; font-weight: 800; font-size: 1rem;
            color: var(--navy); box-shadow: 0 0 24px var(--accent-glow);
        }
        .sidebar-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); text-decoration: none; transition: background 0.2s, color 0.2s;
        }
        .sidebar-icon:hover  { background: var(--navy-light); color: rgba(255,255,255,0.9); }
        .sidebar-icon.active { background: var(--accent-glow); color: var(--accent); }
        .sidebar-bottom { margin-top: auto; }

        /* MAIN */
        .main-area { margin-left: 72px; flex: 1; display: flex; flex-direction: column; }

        /* TOPBAR */
        .topbar {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); }
        .topbar-breadcrumb svg { opacity: 0.4; }
        .crumb-active { color: var(--text); font-weight: 600; }
        .user-chip {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 40px; padding: 0.35rem 1rem 0.35rem 0.5rem;
            font-size: 0.85rem; font-weight: 500;
        }
        .user-avatar {
            width: 30px; height: 30px; background: var(--warn); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.75rem; font-weight: 800;
        }

        /* CONTENT */
        .content { padding: 2rem 2.5rem; flex: 1; }

        .page-header { margin-bottom: 2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .page-header-left h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); }
        .page-header-left p  { color: var(--muted); margin-top: 0.3rem; font-size: 0.9rem; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); text-decoration: none; transition: background 0.15s;
            white-space: nowrap;
        }
        .btn-back:hover { background: var(--border); }

        /* GRID */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

        /* CARD */
        .card {
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
            overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }
        .card-header {
            background: var(--navy); padding: 1rem 1.5rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .card-header h2 { font-size: 0.9rem; font-weight: 700; color: #fff; }
        .card-body { padding: 1.5rem; }

        /* INFO ROWS */
        .info-row {
            display: grid; grid-template-columns: 140px 1fr;
            gap: 0.5rem 1rem; padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            align-items: start;
        }
        .info-row:last-child { border-bottom: none; padding-bottom: 0; }
        .info-row:first-child { padding-top: 0; }
        .info-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding-top: 2px; }
        .info-value { font-size: 0.88rem; color: var(--text); font-weight: 500; }
        .info-value.obs { white-space: pre-wrap; line-height: 1.6; font-weight: 400; }
        .info-value.mono { font-family: var(--mono); font-size: 0.82rem; }

        /* BADGE */
        .badge {
            display: inline-block; padding: 0.28rem 0.75rem;
            border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
        }
        .badge-CRIADO     { background: rgba(0,214,143,0.12);  color: #00a36c; }
        .badge-EM_ANALISE { background: rgba(245,158,11,0.12); color: #b45309; }
        .badge-CONCLUIDO  { background: rgba(59,130,246,0.12); color: #1d4ed8; }

        /* ANEXO */
        .anexo-img {
            width: 100%; border-radius: 10px; object-fit: cover;
            border: 1px solid var(--border); cursor: zoom-in;
            transition: transform 0.2s; display: block; max-height: 280px;
        }
        .anexo-img:hover { transform: scale(1.01); }
        .no-img-box {
            background: var(--surface); border: 2px dashed var(--border);
            border-radius: 10px; padding: 2rem;
            text-align: center; color: var(--muted); font-size: 0.85rem;
        }

        /* FORM */
        .field-group { margin-bottom: 1.2rem; }
        .field-group:last-child { margin-bottom: 0; }
        .field-group label {
            display: block; font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--muted); margin-bottom: 0.45rem;
        }
        .field-group select,
        .field-group textarea {
            width: 100%; padding: 0.7rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 9px;
            font-family: var(--font); font-size: 0.88rem; color: var(--text);
            background: white; outline: none; transition: border-color 0.2s;
            resize: vertical;
        }
        .field-group select:focus,
        .field-group textarea:focus { border-color: var(--accent); }

        .btn-submit {
            width: 100%; padding: 0.75rem;
            background: var(--accent); color: var(--navy);
            border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 700; font-family: var(--font);
            cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
        }
        .btn-submit:hover { background: var(--accent-dim); color: white; }

        /* QUICK ACTIONS */
        .quick-btns { display: flex; gap: 0.6rem; flex-direction: column; }
        .btn-quick {
            width: 100%; padding: 0.65rem;
            border: none; border-radius: 9px;
            font-size: 0.85rem; font-weight: 600; font-family: var(--font);
            cursor: pointer; transition: filter 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 0.4rem;
        }
        .btn-quick:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-quick:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-analise  { background: var(--warn);    color: #fff; }
        .btn-concluir { background: var(--success); color: #fff; }

        /* LIGHTBOX */
        .lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); z-index: 9999;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 10px; }
        .lightbox-close {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            width: 42px; height: 42px; border-radius: 50%;
            font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
<div class="app-shell">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="sidebar-logo">HI</div>
        <a class="sidebar-icon active" th:href="@{/manutencao}" title="Chamados">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
        </a>
        <div class="sidebar-bottom">
            <a class="sidebar-icon" th:href="@{/auth/logout}" title="Sair">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </nav>

    <div class="main-area">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-breadcrumb">
                <span>HelpIF</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <a th:href="@{/manutencao}" style="color:var(--muted);text-decoration:none;">Manutenção</a>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="crumb-active" th:text="'Chamado #' + ${incidente.id}"></span>
            </div>
            <div class="user-chip">
                <div class="user-avatar">M</div>
                <span>Manutenção</span>
            </div>
        </header>

        <main class="content">

            <!-- HEADER -->
            <div class="page-header">
                <div class="page-header-left">
                    <h1 th:text="'Chamado #' + ${incidente.id}"></h1>
                    <p>Detalhes completos e atualização de status do chamado.</p>
                </div>
                <a class="btn-back" th:href="@{/manutencao}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                    Voltar à lista
                </a>
            </div>

            <div class="detail-grid">

                <!-- COLUNA PRINCIPAL -->
                <div>

                    <!-- DADOS DO CHAMADO -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <h2>Informações do Chamado</h2>
                        </div>
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-label">ID</span>
                                <span class="info-value mono" th:text="'#' + ${incidente.id}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Status</span>
                                <span class="badge"
                                      th:classappend="'badge-' + ${incidente.status.name()}"
                                      th:text="${incidente.status.name() == 'CRIADO'} ? 'Criado' :
                                               (${incidente.status.name() == 'EM_ANALISE'} ? 'Em Análise' : 'Concluído')">
                                </span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Categoria</span>
                                <span class="info-value" th:text="${incidente.categoria.name() == 'MANUTENCAO'} ? 'Manutenção' : 'Laboratório'"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Bloco / Área</span>
                                <span class="info-value" th:text="${incidente.bloco.descricao}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Local</span>
                                <span class="info-value" th:text="${incidente.localEspecifico.descricao}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Solicitante</span>
                                <span class="info-value" th:text="${incidente.usuario.nome}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">👷 Responsável</span>
                                <span class="info-value" style="font-weight:700;" th:text="${incidente.responsavel != null} ? ${incidente.responsavel.nome} : 'Não atribuído'"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Data / Hora</span>
                                <span class="info-value mono"
                                      th:text="${#temporals.format(incidente.datetime, 'dd/MM/yyyy HH:mm')}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Descrição</span>
                                <span class="info-value obs" th:text="${incidente.observacao}"></span>
                            </div>
                        </div>
                    </div>

                    <!-- FORM ATUALIZAÇÃO -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            <h2>Atualizar Chamado</h2>
                        </div>
                        <div class="card-body">
                            <form method="post" th:action="@{/manutencao/chamado/{id}/atualizar(id=${incidente.id})}">

                                <div class="field-group">
                                    <label for="status">Status</label>
                                    <select id="status" name="status" required>
                                        <option th:each="s : ${statuses}"
                                                th:value="${s.name()}"
                                                th:text="${s.name() == 'CRIADO'} ? 'Criado' :
                                                         (${s.name() == 'EM_ANALISE'} ? 'Em Análise' : 'Concluído')"
                                                th:selected="${s == incidente.status}">
                                        </option>
                                    </select>
                                </div>

                                <div class="field-group">
                                    <label for="observacaoTecnica">Observação Técnica
                                        <span style="text-transform:none;font-weight:400;color:var(--muted);">— opcional</span>
                                    </label>
                                    <textarea id="observacaoTecnica" name="observacaoTecnica"
                                              rows="4"
                                              placeholder="Descreva a solução aplicada, peças trocadas, diagnóstico técnico..."></textarea>
                                </div>

                                <button type="submit" class="btn-submit">
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                    Salvar Atualização
                                </button>

                            </form>
                        </div>
                    </div>

                </div>

                <!-- COLUNA LATERAL -->
                <div>

                    <!-- ANEXO -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            <h2>Foto do Problema</h2>
                        </div>
                        <div class="card-body">
                            <img th:if="${incidente.anexo != null and !#strings.isEmpty(incidente.anexo)}"
                                 th:src="${incidente.anexo}"
                                 class="anexo-img"
                                 alt="Foto do chamado"
                                 onclick="openLightbox()"/>
                            <div th:if="${incidente.anexo == null or #strings.isEmpty(incidente.anexo)}"
                                 class="no-img-box">
                                📷 Nenhuma foto anexada
                            </div>
                        </div>
                    </div>

                    <!-- AÇÕES RÁPIDAS -->
                    <div class="card">
                        <div class="card-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            <h2>Ações Rápidas</h2>
                        </div>
                        <div class="card-body">
                            <div class="quick-btns">
                                <form method="post" th:action="@{/manutencao/em-analise/{id}(id=${incidente.id})}">
                                    <button class="btn-quick btn-analise" type="submit"
                                            th:disabled="${incidente.status.name() == 'EM_ANALISE' or incidente.status.name() == 'CONCLUIDO'}">
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                        Marcar como Em Análise
                                    </button>
                                </form>
                                <form method="post"
                                      th:action="@{/manutencao/concluir/{id}(id=${incidente.id})}"
                                      onsubmit="return confirm('Confirmar conclusão do chamado?')">
                                    <button class="btn-quick btn-concluir" type="submit"
                                            th:disabled="${incidente.status.name() == 'CONCLUIDO'}">
                                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                        Marcar como Concluído
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img th:if="${incidente.anexo != null}" th:src="${incidente.anexo}" alt="Foto ampliada" onclick="event.stopPropagation()">
</div>

<script>
    function openLightbox() {
        document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
