<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário — HelpIF Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628; --navy-mid: #112240; --navy-light: #1d3461;
            --accent: #00d68f; --accent-dim: #00a36c; --accent-glow: rgba(0,214,143,0.18);
            --danger: #ef4444;
            --surface: #f4f7fb; --card: #ffffff; --border: #e2e8f0;
            --text: #0f1923; --muted: #6b7a99;
            --font: 'Outfit', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--surface); color: var(--text); min-height: 100vh; }
        .app-shell { display: flex; min-height: 100vh; }

        .sidebar {
            width: 72px; background: var(--navy);
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5rem 0; gap: 0.4rem;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }
        .sidebar-logo {
            width: 42px; height: 42px; background: var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem; font-weight: 800; font-size: 1rem;
            color: var(--navy); box-shadow: 0 0 24px var(--accent-glow); letter-spacing: -1px;
        }
        .sidebar-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); text-decoration: none; transition: background 0.2s, color 0.2s;
        }
        .sidebar-icon:hover { background: var(--navy-light); color: rgba(255,255,255,0.9); }
        .sidebar-bottom { margin-top: auto; }
        .main-area { margin-left: 72px; flex: 1; display: flex; flex-direction: column; }

        .topbar {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); }
        .topbar-breadcrumb svg { opacity: 0.4; }
        .crumb-link { color: var(--muted); text-decoration: none; }
        .crumb-link:hover { color: var(--accent-dim); }
        .crumb-active { color: var(--text); font-weight: 600; }
        .user-chip {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 40px; padding: 0.35rem 1rem 0.35rem 0.5rem;
            font-size: 0.85rem; font-weight: 500; text-decoration: none; color: var(--text);
        }
        .user-avatar {
            width: 30px; height: 30px; background: var(--navy); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 0.75rem; font-weight: 800;
        }

        .content { padding: 2rem 2.5rem; flex: 1; max-width: 700px; }
        .page-header { margin-bottom: 1.8rem; }
        .page-header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); }
        .page-header p { color: var(--muted); margin-top: 0.35rem; font-size: 0.9rem; }

        .form-card {
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
            overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .form-header {
            background: var(--navy); padding: 1rem 1.6rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .form-header h2 { font-size: 0.9rem; font-weight: 700; color: #fff; }
        .form-body { padding: 1.8rem; display: flex; flex-direction: column; gap: 1.2rem; }

        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
        input, select {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 9px;
            font-size: 0.9rem; font-family: var(--font);
            background: var(--surface); color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: #fff;
        }

        .form-actions { display: flex; gap: 0.8rem; align-items: center; padding-top: 0.5rem; }
        .btn-save {
            padding: 0.65rem 1.6rem;
            background: var(--accent); color: var(--navy);
            border: none; border-radius: 9px;
            font-size: 0.88rem; font-weight: 700; cursor: pointer;
            transition: filter 0.15s;
        }
        .btn-save:hover { filter: brightness(1.08); }
        .btn-back {
            padding: 0.65rem 1.4rem;
            background: transparent; color: var(--muted);
            border: 1.5px solid var(--border); border-radius: 9px;
            font-size: 0.88rem; font-weight: 600; text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-back:hover { border-color: var(--navy); color: var(--navy); }
    </style>
</head>
<body>
<div class="app-shell">
    <nav class="sidebar">
        <div class="sidebar-logo">HI</div>
        <a class="sidebar-icon" th:href="@{/admin}" title="Painel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
        </a>
        <div class="sidebar-bottom">
            <a class="sidebar-icon" th:href="@{/logout}" title="Sair">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </nav>

    <div class="main-area">
        <header class="topbar">
            <div class="topbar-breadcrumb">
                <span>HelpIF</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <a class="crumb-link" th:href="@{/admin}">Admin</a>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="crumb-active">Editar Usuário</span>
            </div>
            <a class="user-chip" th:href="@{/logout}">
                <div class="user-avatar">A</div>
                <span>Administrador</span>
            </a>
        </header>

        <main class="content">
            <div class="page-header">
                <h1>Editar Usuário</h1>
                <p>Altere os dados do usuário <span th:text="'#' + ${usuario.id}"></span>.</p>
            </div>

            <div class="form-card">
                <div class="form-header">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <h2>Dados do Usuário</h2>
                </div>
                <div class="form-body">
                    <form method="post" th:action="@{/admin/usuario/editar/{id}(id=${usuario.id})}">
                        <div style="display:flex; flex-direction:column; gap:1.2rem;">
                            <div class="field-group">
                                <label for="nome">Nome Completo</label>
                                <input type="text" id="nome" name="nome" required th:value="${usuario.nome}" placeholder="Nome completo">
                            </div>
                            <div class="field-group">
                                <label for="email">E-mail</label>
                                <input type="email" id="email" name="email" required th:value="${usuario.email}" placeholder="email@ifsp.edu.br">
                            </div>
                            <div class="field-group">
                                <label for="role">Tipo de Usuário</label>
                                <select id="role" name="role" required>
                                    <option th:each="r : ${roles}"
                                            th:value="${r}"
                                            th:text="${r.name() == 'ADMIN'} ? 'Administrador' : (${r.name() == 'MANUTENCAO'} ? 'Manutenção' : 'Comum')"
                                            th:selected="${r == usuario.role}"></option>
                                </select>
                            </div>
                            <div class="form-actions">
                                <button class="btn-save" type="submit">Salvar Alterações</button>
                                <a class="btn-back" th:href="@{/admin}">Cancelar</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
