# Servidor
server.port=${PORT:8080}

# Banco de Dados
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/chamados_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Upload de arquivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=${JWT_SECRET:ifsp-chamados-secret-key-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration=86400000

# Logs
logging.level.br.edu.ifsp=DEBUG

# Brevo API HTTP — configurar no Render
# BREVO_API_KEY      = sua chave de API do Brevo (em API Keys, não SMTP)
# BREVO_SENDER_EMAIL = e-mail remetente verificado no Brevo
# BREVO_SENDER_NAME  = nome exibido no e-mail (ex: HelpIF)
