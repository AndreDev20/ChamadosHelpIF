<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário — HelpIF Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628; --navy-mid: #112240; --navy-light: #1d3461;
            --accent: #00d68f; --accent-dim: #00a36c; --accent-glow: rgba(0,214,143,0.18);
            --danger: #ef4444; --danger-bg: rgba(239,68,68,0.08);
            --surface: #f4f7fb; --card: #ffffff; --border: #e2e8f0;
            --text: #0f1923; --muted: #6b7a99;
            --font: 'Outfit', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font); background: var(--surface); color: var(--text); min-height: 100vh; }
        .app-shell { display: flex; min-height: 100vh; }

        .sidebar {
            width: 72px; background: var(--navy);
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5rem 0; gap: 0.4rem;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
        }
        .sidebar-logo {
            width: 42px; height: 42px; background: var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem; font-weight: 800; font-size: 1rem;
            color: var(--navy); box-shadow: 0 0 24px var(--accent-glow); letter-spacing: -1px;
        }
        .sidebar-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); text-decoration: none; transition: background 0.2s, color 0.2s;
        }
        .sidebar-icon:hover { background: var(--navy-light); color: rgba(255,255,255,0.9); }
        .sidebar-bottom { margin-top: auto; }
        .main-area { margin-left: 72px; flex: 1; display: flex; flex-direction: column; }

        .topbar {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-breadcrumb { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--muted); }
        .topbar-breadcrumb svg { opacity: 0.4; }
        .crumb-link { color: var(--muted); text-decoration: none; }
        .crumb-link:hover { color: var(--accent-dim); }
        .crumb-active { color: var(--text); font-weight: 600; }
        .user-chip {
            display: flex; align-items: center; gap: 0.6rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 40px; padding: 0.35rem 1rem 0.35rem 0.5rem;
            font-size: 0.85rem; font-weight: 500; text-decoration: none; color: var(--text);
        }
        .user-avatar {
            width: 30px; height: 30px; background: var(--navy); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 0.75rem; font-weight: 800;
        }

        .content { padding: 2rem 2.5rem; flex: 1; max-width: 700px; }
        .page-header { margin-bottom: 1.8rem; }
        .page-header h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.5px; color: var(--navy); }
        .page-header p { color: var(--muted); margin-top: 0.35rem; font-size: 0.9rem; }

        .form-card {
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
            overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .form-header {
            background: var(--navy); padding: 1rem 1.6rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .form-header h2 { font-size: 0.9rem; font-weight: 700; color: #fff; }
        .form-body { padding: 1.8rem; display: flex; flex-direction: column; gap: 1.2rem; }

        .alert-erro {
            background: var(--danger-bg); border: 1px solid rgba(239,68,68,0.25);
            border-radius: 9px; padding: 0.75rem 1rem;
            color: #b91c1c; font-size: 0.85rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
        input, select {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 9px;
            font-size: 0.9rem; font-family: var(--font);
            background: var(--surface); color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: #fff;
        }

        .form-actions { display: flex; gap: 0.8rem; align-items: center; padding-top: 0.5rem; }
        .btn-save {
            padding: 0.65rem 1.6rem;
            background: var(--accent); color: var(--navy);
            border: none; border-radius: 9px;
            font-size: 0.88rem; font-weight: 700; cursor: pointer;
            transition: filter 0.15s;
        }
        .btn-save:hover { filter: brightness(1.08); }
        .btn-back {
            padding: 0.65rem 1.4rem;
            background: transparent; color: var(--muted);
            border: 1.5px solid var(--border); border-radius: 9px;
            font-size: 0.88rem; font-weight: 600; text-decoration: none;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-back:hover { border-color: var(--navy); color: var(--navy); }
    
        /* ════════════════════════════════════════════
           RESPONSIVIDADE MOBILE
           ════════════════════════════════════════════ */

        /* Bottom nav (mobile) */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: var(--navy);
            z-index: 200;
            border-top: 1px solid rgba(255,255,255,0.08);
            align-items: center;
            justify-content: space-around;
        }
        .mobile-nav a {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.5); text-decoration: none; gap: 0.15rem;
            font-size: 0.6rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
            flex: 1; height: 100%; transition: color 0.2s;
        }
        .mobile-nav a.active, .mobile-nav a:hover { color: var(--accent); }
        .mobile-nav svg { flex-shrink: 0; }

        @media (max-width: 768px) {
            /* Esconde sidebar, mostra bottom nav */
            .sidebar { display: none !important; }
            .mobile-nav { display: flex !important; }

            /* Remove margem da sidebar */
            .main-area { margin-left: 0 !important; }

            /* Padding do content + espaço p/ bottom nav */
            .content { padding: 1rem 1rem 5rem 1rem !important; }

            /* Topbar mais compacta */
            .topbar { padding: 0 1rem !important; height: 56px !important; }
            .topbar-breadcrumb { font-size: 0.78rem !important; }
            /* Esconde partes do breadcrumb no mobile (mantém só o último) */
            .topbar-breadcrumb > *:not(:last-child) { display: none; }
            .topbar-breadcrumb > svg { display: none; }

            /* User chip simplificado */
            .user-chip span { display: none; }
            .user-chip { padding: 0.3rem !important; border-radius: 50% !important; }

            /* Títulos menores */
            .page-header h1 { font-size: 1.3rem !important; }

            /* Stats: 2 colunas */
            .stats-row { grid-template-columns: repeat(2, 1fr) !important; gap: 0.6rem !important; }
            .stat-value { font-size: 1.5rem !important; }

            /* Info banner compacto */
            .info-banner { padding: 1rem !important; }
            .info-banner p { display: none; }

            /* Seção header: empilha título e contagem */
            .section-header { flex-wrap: wrap; gap: 0.4rem; padding: 0.8rem 1rem !important; }

            /* TABELAS → CARDS em mobile */
            .tbl-wrap { overflow-x: visible !important; }
            table { display: block !important; }
            thead { display: none !important; }
            tbody { display: flex !important; flex-direction: column !important; gap: 0.75rem !important; padding: 0.75rem !important; }
            tbody tr {
                display: grid !important;
                grid-template-columns: auto 1fr !important;
                gap: 0.3rem 0.6rem !important;
                border: 1px solid var(--border) !important;
                border-radius: 12px !important;
                padding: 0.9rem !important;
                background: var(--card) !important;
                box-shadow: 0 1px 4px rgba(0,0,0,0.06) !important;
                border-bottom: 1px solid var(--border) !important;
            }
            tbody tr.empty {
                display: block !important;
                text-align: center !important;
                padding: 2rem !important;
                border: 2px dashed var(--border) !important;
            }
            tbody td {
                display: contents !important;
                padding: 0 !important;
                font-size: 0.82rem !important;
            }
            tbody td::before {
                content: attr(data-label);
                font-size: 0.65rem !important;
                font-weight: 700 !important;
                text-transform: uppercase !important;
                letter-spacing: 0.06em !important;
                color: var(--muted) !important;
                align-self: center !important;
                white-space: nowrap !important;
            }
            /* Ações: ocupa linha inteira */
            tbody td:last-child {
                grid-column: 1 / -1 !important;
                display: flex !important;
                flex-wrap: wrap !important;
                gap: 0.4rem !important;
                margin-top: 0.4rem !important;
                padding-top: 0.5rem !important;
                border-top: 1px dashed var(--border) !important;
            }
            tbody td:last-child::before { display: none !important; }
            .actions { flex-wrap: wrap !important; }
            .btn { font-size: 0.8rem !important; padding: 0.4rem 0.8rem !important; }

            /* Obs cell: não trunca no mobile */
            .obs-cell { white-space: normal !important; max-width: none !important; }

            /* Formulários */
            .field-row { grid-template-columns: 1fr !important; }
            .form-footer { flex-direction: column-reverse !important; gap: 0.6rem !important; }
            .btn-submit, .btn-back, .btn-save {
                width: 100% !important;
                justify-content: center !important;
            }
            .form-body { padding: 1.2rem !important; }
            .content { max-width: 100% !important; }

            /* Grids de layout */
            .content-grid { grid-template-columns: 1fr !important; }
            .content-side { position: static !important; display: flex !important; flex-direction: column !important; }
            .detail-grid  { grid-template-columns: 1fr !important; }

            /* Categoria pills */
            .categoria-pills { flex-direction: column !important; }
            .status-selector { flex-direction: column !important; }

            /* Card detalhe */
            .info-row { grid-template-columns: 110px 1fr !important; }

            /* Page header */
            .page-header { flex-direction: column !important; align-items: flex-start !important; }
        }

        @media (max-width: 380px) {
            .stats-row { grid-template-columns: 1fr 1fr !important; }
            .btn { font-size: 0.75rem !important; padding: 0.35rem 0.6rem !important; }
        }
</style>
</head>
<body>
<div class="app-shell">
    <nav class="sidebar">
        <div class="sidebar-logo">HI</div>
        <a class="sidebar-icon" th:href="@{/admin}" title="Painel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
        </a>
        <div class="sidebar-bottom">
            <a class="sidebar-icon" th:href="@{/auth/logout}" title="Sair">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </nav>

    <div class="main-area">
        <header class="topbar">
            <div class="topbar-breadcrumb">
                <span>HelpIF</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <a class="crumb-link" th:href="@{/admin}">Admin</a>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                <span class="crumb-active">Novo Usuário</span>
            </div>
            <a class="user-chip" th:href="@{/auth/logout}">
                <div class="user-avatar">A</div>
                <span>Administrador</span>
            </a>
        </header>

        <main class="content">
            <div class="page-header">
                <h1>Cadastrar Usuário</h1>
                <p>Preencha os dados para criar um novo acesso ao sistema.</p>
            </div>

            <div class="form-card">
                <div class="form-header">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <h2>Novo Usuário</h2>
                </div>
                <div class="form-body">
                    <div class="alert-erro" th:if="${erro}">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <span th:text="${erro}"></span>
                    </div>

                    <form method="post" th:action="@{/admin/usuario/novo}">
                        <div style="display:flex; flex-direction:column; gap:1.2rem;">
                            <div class="field-group">
                                <label for="nome">Nome Completo</label>
                                <input type="text" id="nome" name="nome" required placeholder="Ex: João da Silva">
                            </div>
                            <div class="field-group">
                                <label for="email">E-mail</label>
                                <input type="email" id="email" name="email" required placeholder="email@ifsp.edu.br">
                            </div>
                            <div class="field-group">
                                <label for="senha">Senha</label>
                                <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6">
                            </div>
                            <div class="field-group">
                                <label for="role">Tipo de Usuário</label>
                                <select id="role" name="role" required>
                                    <option value="" disabled selected>Selecione o tipo...</option>
                                    <option th:each="r : ${roles}"
                                            th:value="${r}"
                                            th:text="${r.name() == 'ADMIN'} ? 'Administrador' : (${r.name() == 'MANUTENCAO'} ? 'Manutenção' : 'Comum')">
                                    </option>
                                </select>
                            </div>
                            <div class="form-actions">
                                <button class="btn-save" type="submit">Criar Usuário</button>
                                <a class="btn-back" th:href="@{/admin}">Cancelar</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="mobile-nav">
        <a th:href="@{/admin}" class="active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Painel
        </a>
        <a th:href="@{/admin/usuario/novo}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Usuários
        </a>
        <a th:href="@{/auth/logout}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sair
        </a>
    </nav>

</body>
</html>
